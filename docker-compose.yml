version: '3.8'

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: nutri_salad
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/nutri_salad
      JWT_SECRET: ${JWT_SECRET:-ns_jwt_secret_dev_change_in_prod}
      JWT_EXPIRES_IN: 7d
      CLIENT_URL: http://localhost
      NODE_ENV: production
      PORT: 5000
    ports:
      - "5000:5000"
    volumes:
      - server_uploads:/app/uploads

  client:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "80:80"

volumes:
  postgres_data:
  server_uploads:
